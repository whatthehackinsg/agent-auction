name = "auction-engine"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
rules = [{ type = "CompiledWasm", globs = ["**/*.wasm"] }]

[[d1_databases]]
binding = "AUCTION_DB"
database_name = "auction-engine-db"
database_id = "931d6378-238f-4849-919b-f76d083485b7"

[[durable_objects.bindings]]
name = "AUCTION_ROOM"
class_name = "AuctionRoom"

[vars]
X402_MODE = "on"
ENGINE_X402_DISCOVERY = "true"
ENGINE_X402_DISCOVERY_PRICE = "$0.001"
ENGINE_X402_DETAIL_PRICE = "$0.001"
X402_RECEIVER_ADDRESS = "0x633ec0e633AA4d8BbCCEa280331A935747416737"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AuctionRoom"]
